<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #004080, #0080ff);
    }

    .login-container {
        width: 350px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
    }

    .logo {
        width: 100px;
        margin-bottom: 15px;
    }

    h2 {
        color: #004080;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #004080;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #002d5a;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #666;
    }
</style>
</head>
<body>

<div class="login-container">
    <img src="college-logo.png" alt="College Logo" class="logo">

    <h2>College Login</h2>

    <form>
        <div class="input-group">
            <input type="text" placeholder="Student ID" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2026 Your College Name
    </div>
</div>

</body>
</html>
