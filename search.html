<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .search-container {
            text-align: center;
        }

        input[type="text"] {
            width: 300px;
            padding: 12px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .notice {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="search-container">
    <form action="https://formsubmit.co/your-email@example.com" method="POST">
        <input
            type="text"
            name="search_query"
            placeholder="Enter your search"
            required
        >

        <button type="submit">Search</button>

        <!-- Optional FormSubmit settings -->
        <input type="hidden" name="_subject" value="New Search Query">
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect after submission -->
        <input type="hidden" name="_next" value="https://example.com/thank-you.html">
    </form>

    <div class="notice">
        Submitted queries will be sent to the site owner.
    </div>
</div>

</body>
</html>
